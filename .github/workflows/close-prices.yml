name: Capture Closing Prices

on:
  schedule:
    # EU close: 17:00 UTC — sempre dopo la chiusura EU (17:30 Roma)
    # sia in estate (CEST UTC+2) che in inverno (CET UTC+1)
    - cron: '0 17 * * 1-5'

    # US close: 22:00 UTC — sempre dopo la chiusura US (16:00 New York)
    # sia in estate (EDT UTC-4) che in inverno (EST UTC-5)
    - cron: '0 22 * * 1-5'

  workflow_dispatch:
    inputs:
      market_override:
        description: 'Forza mercato (EU | US | BOTH) — lascia vuoto per rilevamento automatico'
        required: false
        default: ''

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Capture closing prices
        env:
          GIST_TOKEN:       ${{ secrets.GIST_TOKEN }}
          GIST_ID:          ${{ secrets.GIST_ID }}
          FINNHUB_KEY:      ${{ secrets.FINNHUB_KEY }}
          MARKET_OVERRIDE:  ${{ github.event.inputs.market_override }}
        run: node scripts/update-official-closes.mjs
