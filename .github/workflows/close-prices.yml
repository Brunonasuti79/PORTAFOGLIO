name: Capture Closing Prices

on:
  schedule:
    # EU close — primario e backup
    # EU chiude 17:30 Roma = 15:30 UTC estate / 16:30 UTC inverno
    # 17:00 UTC = 19:00 Roma estate / 18:00 inverno  → dopo chiusura ✓
    # 18:00 UTC = 20:00 Roma estate / 19:00 inverno  → backup ✓
    - cron: '0 17 * * 1-5'
    - cron: '0 18 * * 1-5'

    # US close — primario e backup
    # US chiude 16:00 NY = 20:00 UTC estate / 21:00 UTC inverno
    # 22:30 UTC = 18:30 NY estate / 17:30 inverno  → dopo chiusura ✓
    # 23:00 UTC = 19:00 NY estate / 18:00 inverno  → backup ✓
    - cron: '30 22 * * 1-5'
    - cron: '0 23 * * 1-5'

  workflow_dispatch:
    inputs:
      market_override:
        description: 'Forza mercato (EU | US | BOTH) — lascia vuoto per rilevamento automatico'
        required: false
        default: ''

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Capture closing prices
        env:
          GIST_TOKEN:       ${{ secrets.GIST_TOKEN }}
          GIST_ID:          ${{ secrets.GIST_ID }}
          FINNHUB_KEY:      ${{ secrets.FINNHUB_KEY }}
          MARKET_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.market_override || '' }}
        run: node scripts/update-official-closes.mjs
